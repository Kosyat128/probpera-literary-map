<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">

  <!-- LiteraryMap custom SVG map -->
  <!-- Layer prepared for replacing prototype shapes with final traced country contours -->

  <style>
    .country {
      fill: #35205F;
      stroke: #F7EBDD;
      stroke-width: 1;
      cursor: pointer;
      transition: .25s;
    }

    .country:hover {
      fill: #E97824;
    }
  </style>

  <g id="countries">

    <!-- Prototype country objects. Final geographic paths will replace these. -->

    <path id="russia" data-name="Россия" class="country"
      d="M720 150 L980 150 L1080 230 L930 280 L760 250 Z" />

    <path id="france" data-name="Франция" class="country"
      d="M470 260 L520 250 L550 300 L500 340 L450 310 Z" />

    <path id="uk" data-name="Великобритания" class="country"
      d="M430 180 L460 160 L480 210 L450 230 Z" />

    <path id="usa" data-name="США" class="country"
      d="M180 270 L390 250 L450 340 L330 390 L180 350 Z" />

    <path id="japan" data-name="Япония" class="country"
      d="M1030 330 L1060 300 L1080 360 L1050 400 Z" />

  </g>

</svg>
